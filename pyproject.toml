[project]
name = "a2"
version = "0.6.0"
description = "Script managing and developing framework for Autohotkey"
authors = [{ name = "ewerybody", url = "https://github.com/ewerybody" }]
license = { text = "GPL-3.0" }
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "PySide6",
]

[project.urls]
Homepage = "https://github.com/ewerybody/a2#readme"
Issues = "https://github.com/ewerybody/a2/issues"

[dependency-groups]
dev = [
    "pytest",
    "poethepoet",
]

[tool.uv]
package = false

[tool.poe.tasks]
test-py  = "pytest ui/test"
test-ahk = "python lib/Autohotkey/lib/test/run_ahk_tests.py"
test     = ["test-py", "test-ahk"]